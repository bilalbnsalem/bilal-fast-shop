<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin | the-B-Store</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="app.js"></script>
</head>
<body>

<header>لوحة التحكم — the-B-Store</header>

<div style="padding:20px">
  <input type="file" id="img"><br><br>
  <input type="text" id="name" placeholder="اسم المنتج"><br><br>
  <input type="number" id="price" placeholder="السعر"><br><br>
  <button onclick="add()">إضافة منتج</button>
</div>

<div class="products" id="products"></div>

<script>
function add(){
  const file=document.getElementById("img").files[0];
  const name=document.getElementById("name").value;
  const price=document.getElementById("price").value;

  if(!file || !name || !price){
    alert("أكمل كل البيانات");
    return;
  }

  const reader=new FileReader();
  reader.onload=()=>{
    products.push({
      img:reader.result,
      name,
      price
    });
    saveProducts();
    render();
  };
  reader.readAsDataURL(file);
}

function del(i){
  products.splice(i,1);
  saveProducts();
  render();
}

function render(){
  const box=document.getElementById("products");
  box.innerHTML="";

  products.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.price} DT</p>
        <button onclick="del(${i})">حذف</button>
      </div>
    `;
  });
}

render();
</script>

</body>
</html>
